# 飞书 Bot 配置 / Feishu Bot settings
feishu_bot:
  enabled: false                     # 启用飞书 Bot / Enable Feishu Bot
  app_id: "${FEISHU_APP_ID}"         # 飞书应用 App ID
  app_secret: "${FEISHU_APP_SECRET}" # 飞书应用 App Secret
  verification_token: "${FEISHU_VERIFICATION_TOKEN}"
  max_turns: 10                      # 最多保留对话轮数 / Max conversation turns
  context_ttl_minutes: 30            # 对话上下文过期时间 / Context TTL (minutes)
  # 权限配置 / Permission settings
  permissions:
    - user_ids: ["*"]                # 所有人 / All users
      mcp_servers: ["test-warehouse"]
    # - user_ids: ["u_admin1"]       # 管理员 / Admin users
    #   mcp_servers: ["production-erp", "analytics-db"]

# 定时任务配置 / Scheduler settings
scheduler:
  enabled: true                    # 是否启用调度器 / Enable scheduler
  jobs:
    - name: "daily-check"          # 任务名称 / Job name
      cron: "0 9 * * *"           # Cron 表达式 / Cron expression (每天9点)
      rule_ids: ["rule-001"]       # 关联规则 ID / Associated rule IDs
      connector: "mock"            # 数据源 / Data source connector

