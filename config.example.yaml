# ============================================================
# OrderGuard 配置文件
# Configuration file for OrderGuard
#
# 复制此文件为 config.yaml 并填入实际值
# Copy this file to config.yaml and fill in actual values
#
# 环境变量可覆盖任何配置项，前缀 OG_，嵌套用 __ 分隔
# Environment variables override any config, prefix OG_, nested with __
# 例 / Example: OG_LLM__MODEL=openai/gpt-4o
# ============================================================

# 应用基础配置 / Application settings
app:
  name: "OrderGuard"
  debug: false                     # 调试模式 / Debug mode
  log_level: "INFO"                # 日志级别 / Log level: DEBUG, INFO, WARNING, ERROR
  log_dir: "logs"                  # 日志目录 / Log directory

# LLM 配置 / LLM settings (via LiteLLM)
llm:
  model: "openai/gpt-4o"          # LiteLLM 模型标识 / Model identifier
  api_key: "${OG_LLM_API_KEY}"    # API Key（建议用环境变量）/ API key (use env var)
  api_base: ""                     # 自定义 API 地址 / Custom API base URL
  max_tokens: 4096                 # 最大输出 token 数 / Max output tokens
  temperature: 0.1                 # 温度参数 / Temperature

# 数据库配置 / Database settings
database:
  url: "sqlite:///data/orderguard.db"  # SQLite 或 PostgreSQL 连接串

# 数据源配置 / Data source connectors
connectors:
  - name: "mock"                   # 连接器名称 / Connector name
    type: "mock"                   # 连接器类型 / Connector type
    enabled: true                  # 是否启用 / Enabled

# 告警推送配置 / Alert channel settings
alerts:
  silence_minutes: 30              # 告警静默期（分钟），同规则同级别同标题不重复推送；0 = 禁用
  channels:
    - name: "default-webhook"      # 渠道名称 / Channel name
      type: "webhook"              # 渠道类型 / Channel type: webhook
      url: "${OG_WEBHOOK_URL}"     # Webhook URL（建议用环境变量）
      enabled: true
    # 企业微信示例 / WeCom webhook example (auto-detected by URL)
    # - name: "wecom"
    #   type: "webhook"
    #   url: "https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=YOUR_KEY"
    #   enabled: true
    # 飞书示例 / Feishu webhook example (auto-detected by URL)
    # - name: "feishu"
    #   type: "webhook"
    #   url: "https://open.feishu.cn/open-apis/bot/v2/hook/YOUR_TOKEN"
    #   enabled: true

# MCP Server 配置 / MCP Server settings
# 通过 MCP 协议连接外部数据源（数据库、SaaS 等）
# Connect external data sources via MCP protocol
mcp_servers:
  # SQLite 数据库示例（stdio 传输）/ SQLite example (stdio transport)
  # - name: "warehouse-db"
  #   transport: "stdio"
  #   command: "npx"
  #   args: ["-y", "@modelcontextprotocol/server-sqlite", "data/warehouse.db"]
  #   enabled: true

  # 远程 MCP Server 示例（SSE 传输）/ Remote MCP example (SSE transport)
  # - name: "erp-api"
  #   transport: "sse"
  #   url: "https://erp-mcp.company.com/sse"
  #   headers:
  #     Authorization: "Bearer ${ERP_API_KEY}"
  #   enabled: true

# 定时任务配置 / Scheduler settings
scheduler:
  enabled: true                    # 是否启用调度器 / Enable scheduler
  jobs:
    - name: "daily-check"          # 任务名称 / Job name
      cron: "0 9 * * *"           # Cron 表达式 / Cron expression (每天9点)
      rule_ids: ["rule-001"]       # 关联规则 ID / Associated rule IDs
      connector: "mock"            # 数据源 / Data source connector
