# ============================================================
# OrderGuard 配置文件
# Configuration file for OrderGuard
#
# 复制此文件为 config.yaml 并填入实际值
# Copy this file to config.yaml and fill in actual values
#
# 环境变量可覆盖任何配置项，前缀 OG_，嵌套用 __ 分隔
# Environment variables override any config, prefix OG_, nested with __
# 例 / Example: OG_LLM__MODEL=openai/gpt-4o
# ============================================================

# 应用基础配置 / Application settings
app:
  name: "OrderGuard"
  debug: false                     # 调试模式 / Debug mode
  log_level: "INFO"                # 日志级别 / Log level: DEBUG, INFO, WARNING, ERROR
  log_dir: "logs"                  # 日志目录 / Log directory

# LLM 配置 / LLM settings (via LiteLLM)
llm:
  model: "${OG_LLM_MODEL}"         # LiteLLM 模型标识 / Model identifier
  api_key: "${OG_LLM_API_KEY}"    # API Key（建议用环境变量）/ API key (use env var)
  api_base: "${OG_LLM_API_BASE}"  # 阿里百炼 API 地址 / Custom API base URL
  max_tokens: 4096                 # 最大输出 token 数 / Max output tokens
  temperature: 0.1                 # 温度参数 / Temperature

# 数据库配置 / Database settings
database:
  url: "sqlite:///data/orderguard.db"  # SQLite 或 PostgreSQL 连接串

# 数据源配置 / Data source connectors
connectors:
  - name: "mock"                   # 连接器名称 / Connector name
    type: "mock"                   # 连接器类型 / Connector type
    enabled: false                 # 禁用 Mock，使用 CSV 数据源

  - name: "csv-erp"               # CSV/Excel 数据源
    type: "csv"
    enabled: true
    config:
      inventory_file: "data/example/inventory.csv"
      orders_file: "data/example/orders.csv"
      sales_file: "data/example/sales.csv"

# 业务知识背景（注入到 Agent 分析提示中）
# Business context injected into Agent prompts
business_context: |
  公司：跨境电商，主营家居品类
  主要平台：Amazon US、Walmart、TEMU
  毛利率目标：25%以上
  当前策略：清仓低动销SKU，主推新品
  旺季：Q4（10-12月），需提前3个月备货

# 告警推送配置 / Alert channel settings
alerts:
  silence_minutes: 30
  channels:
    - name: "default-webhook"      # 渠道名称 / Channel name
      type: "webhook"              # 渠道类型 / Channel type: webhook
      url: "${OG_FEISHU_WEBHOOK_URL}"  # 飞书 Webhook URL
      enabled: true

# MCP Server 配置
mcp_servers:
  # SQLite 测试仓库（原有）
  - name: "test-warehouse"
    transport: "stdio"
    command: "python"
    args: ["scripts/sqlite_mcp_server.py", "data/test_warehouse.db"]
    enabled: true

  # MySQL ERP 数据库（生产模拟）
  - name: "mysql-erp"
    type: "dbhub"
    databases:
      - alias: "erp"
        dsn: "mysql://og_readonly:og_test_2026@localhost:3306/orderguard_erp"
        query_timeout: 10
    security:
      readonly: true
      max_rows: 1000
    enabled: true

  # PostgreSQL 分析数据库（生产模拟）
  - name: "pg-analytics"
    type: "dbhub"
    databases:
      - alias: "analytics"
        dsn: "postgres://og_readonly:og_test_2026@localhost:5432/orderguard_analytics"
        query_timeout: 15
    security:
      readonly: true
      max_rows: 2000
    enabled: true

  # MySQL 生产模拟库（Kaggle 公开数据集：Olist 100K 订单 + 退货 + 库存）
  - name: "mysql-prod"
    type: "dbhub"
    databases:
      - alias: "prod"
        dsn: "mysql://og_readonly:og_test_2026@localhost:3306/orderguard_prod"
        query_timeout: 15
    security:
      readonly: true
      max_rows: 2000
    enabled: true

# 定时任务配置 / Scheduler settings
scheduler:
  enabled: false                   # 临时关闭调度器，飞书 Bot 测试
  jobs:
    - name: "daily-check"          # 任务名称 / Job name
      cron: "0 9 * * *"           # Cron 表达式 / Cron expression (每天9点)
      rule_ids: ["rule-001"]       # 关联规则 ID / Associated rule IDs
      connector: "mock"            # 数据源 / Data source connector

# 定时报告配置 / Scheduled reports
reports:
  - id: "daily-report"
    name: "每日经营日报"
    schedule: "0 9 * * *"              # 每天 9:00
    mcp_server: "mysql-erp"
    focus: |
      请生成今日经营日报，包含：
      1. 昨日销售概况（总销量、总GMV、同比变化）
      2. TOP5 热销 SKU 和 TOP5 滞销 SKU
      3. 库存预警（可售天数 < 7 天的 SKU）
      4. 异常告警汇总
      5. 需要关注的风险点
    channels: "default"
    enabled: true

  - id: "weekly-report"
    name: "每周经营周报"
    schedule: "0 9 * * 1"              # 每周一 9:00
    mcp_server: "mysql-erp"
    focus: |
      请生成本周经营周报，包含：
      1. 本周 vs 上周核心指标对比（销量、GMV、退货率）
      2. SKU 表现排名变化
      3. 本周告警统计和处理情况
      4. 下周需要关注的事项
    channels: "default"
    enabled: true

# 飞书 Bot 对话配置
feishu_bot:
  enabled: true
  app_id: "${FEISHU_APP_ID}"
  app_secret: "${FEISHU_APP_SECRET}"
  verification_token: "${FEISHU_VERIFICATION_TOKEN}"
  max_turns: 10
  context_ttl_minutes: 30
  session_timeout_minutes: 30        # 会话超时自动归档（分钟），0=禁用
  permissions:
    - user_ids: ["*"]
      mcp_servers: ["test-warehouse", "mysql-erp", "pg-analytics", "mysql-prod"]
