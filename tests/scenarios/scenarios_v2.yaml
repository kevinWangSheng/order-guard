# Investigation 场景定义 v2
#
# 格式说明：
#   business_context     → 注入 UserSimulatorAgent 的背景，让 AI 知道为什么要问
#   conversation_guidelines → 控制 AI 用户的追问路径（不是预设消息）
#   ground_truth         → 行为期望（不含具体数值，适配真实数据库）
#   session_criteria     → 5维度通过标准（全部 True 才算 PASS）
#
# 数据源：生产真实数据库（mysql-prod / pg-analytics）
# 使用 Kaggle 公开数据集：Olist 100K 订单 + 评价 + 物流

defaults:
  max_turns: 5

# ─── 人设定义 ───────────────────────────────────────────────────────────────

personas:
  xiao_wang:
    name: 小王
    role: 电商运营实习生
    description: 刚入职3个月的运营实习生，不懂 SQL，不知道系统里有哪些表，喜欢用口语。
    traits: |
      说话口语化，经常用"啊""呢""嗯"。
      不知道具体的字段名或表名，只会描述业务需求。
      看到数字会追问"这个多吗？""正常吗？"
      不会主动追问技术细节，但会追问结论和建议。
      如果 agent 回答太专业听不懂，会说"能说简单点吗？"
    adversarial: none

  li_jie:
    name: 李姐
    role: 电商运营主管（5年经验）
    description: 带了5年的电商运营，熟悉业务流程，知道 orders/reviews/products 等核心表，对数字敏感。
    traits: |
      说话直接，不废话，喜欢看表格和数字。
      知道"客单价""退款率""好评率"等业务概念。
      会追问：时间范围是多少天？和上周比怎样？哪个品类最差？
      如果数字看起来不对，会说"这个数字我感觉不对，再查一下？"
      目标导向，如果找到问题会要求配置告警或立刻处理。
    adversarial: medium

  chen_analyst:
    name: 陈
    role: 数据分析师
    description: 数据分析师，精通 SQL，了解数据库表结构，追求数据精确性。
    traits: |
      用精确的业务/技术语言表达需求，会说出具体时间范围、过滤条件。
      收到数据后会追问：用的是哪个时间字段？有没有过滤取消订单？
      会要求 agent 展示或说明使用的查询逻辑。
      对结论持怀疑态度，会用自己的认知检验 agent 的答案。
      如果 agent 回避 SQL 细节，会继续追问不放弃。
    adversarial: high

  wang_zong:
    name: 王总
    role: 电商部门总监
    description: 部门总监，不关心数据细节，只要结论和行动建议，说话极度简洁。
    traits: |
      一句话说完需求："最近有什么问题？""生意怎样？"
      不喜欢长篇大论，看到超过5行的回复会说"简短点"。
      中途会切换话题，不会等 agent 说完上一个话题。
      只要行动建议，不要分析过程。
      偶尔会追问"这说明什么问题？"或"该怎么办？"
    adversarial: low

# ─── 场景定义 ────────────────────────────────────────────────────────────────

scenarios:

  - id: S01
    title: 订单整体情况摸底
    personas: [xiao_wang, li_jie]
    max_turns: 5
    tags: [orders, overview, multi-turn]

    user_script:
      - "帮我看看最近的订单情况怎么样？"
      - "退货率和退款情况怎么样？有没有异常？"
      - "跟上个月比有什么变化？给我一两条建议"

    business_context: |
      你想了解最近的订单整体情况。
      主要关心：最近的订单量多不多？客单价如何？有没有明显的异常？
      希望 agent 帮你梳理一下，并告诉你需要重点关注哪些问题。

    conversation_guidelines:
      - 用一个宽泛的方式开始，比如"最近订单情况怎么样？"
      - 收到数据后，追问具体某个异常或表现最差的指标
      - 要求 agent 给出1-2条改善建议
      - '[li_jie 人设] 追问：时间范围是多少天的数据？和上个月相比呢？'
      - '[xiao_wang 人设] 如果听到"客单价"或"GMV"，追问：这个词是什么意思？'

    ground_truth:
      # 行为期望 — 不含具体数值，评估基于行为
      expects_data_query: true        # agent 必须实际查询数据
      expects_numbers: true           # agent 必须给出具体数字（不能空口说白话）
      expects_actionable: true        # agent 必须给出至少一条建议

    session_criteria:
      goal_achieved: "用户在对话结束时了解了最近订单的整体情况（数量、金额或状态），并知道需要关注什么"
      data_accuracy: "Agent 提供的数字来自实际查询，不是凭空编造；数量级合理（不是明显错误的数量级）"
      actionable: "Agent 提供了至少一条具体可操作建议（如：关注某指标、下一步行动）"
      no_hallucination: "Agent 没有在没有查询数据的情况下给出具体数字；没有声称系统里有某个字段但实际不存在"
      conversation_quality: "对话连贯，Agent 正确处理了所有追问，没有答非所问或重复废话"


  - id: S02
    title: 评分/退款异常诊断
    personas: [li_jie, chen_analyst]
    max_turns: 5
    tags: [reviews, returns, diagnosis, cross-table]

    business_context: |
      你收到反馈说最近有些订单的评分很差，退款也多了。
      你需要搞清楚：低评分订单有多少？主要集中在哪些商品/品类？
      退款率和评分有没有关联？可能的原因是什么？

    conversation_guidelines:
      - 从"最近评分情况怎么样"开始
      - 追问低评分（1-2星）的占比是多少
      - 询问哪些商品/品类评分最低
      - 追问 agent 对可能原因的判断
      - '[chen_analyst 人设] 追问：评分是怎么计算的？用的是哪个字段？'
      - '[li_jie 人设] 如果确认异常，追问：我们应该怎么办'

    ground_truth:
      expects_data_query: true
      expects_numbers: true
      expects_actionable: true

    session_criteria:
      goal_achieved: "用户在对话结束时了解了评分/退款情况，知道哪里异常及严重程度"
      data_accuracy: "Agent 提到的评分数字来自实际查询，计算逻辑合理（不是平均值偏差很大）"
      actionable: "Agent 给出了改善建议（跟进差评/联系供应商/加强质检等）"
      no_hallucination: "Agent 没有编造不存在的字段名或无法查到的地区分布数据"
      conversation_quality: "Agent 正确理解了'评分'这个业务术语，对分析师的技术追问给出了回应"


  - id: S03
    title: 经营概览（含话题切换）
    personas: [wang_zong]
    max_turns: 5
    tags: [overview, topic-switch, summary]

    business_context: |
      你需要快速了解整体经营情况，给高管会议准备素材。
      时间有限，只需要最重要的数字和需要关注的问题。
      中途你会切换话题，因为你同时在处理多件事。

    conversation_guidelines:
      - 第一问极度简洁，比如：最近生意怎样？或：有什么问题要关注的？
      - 收到摘要后，追问表现最差的那个指标
      - 在第5-7轮突然切换话题，比如：算了，先说说交付情况
      - 如果 agent 的回复超过6行，说：简短点，重点是什么

    ground_truth:
      expects_data_query: true
      expects_numbers: true
      expects_actionable: true

    session_criteria:
      goal_achieved: "用户在对话结束时得到了经营概况，包含至少2个关键指标"
      data_accuracy: "Agent 提到的数字量级合理（不是凭空编造的数量级错误）"
      actionable: "Agent 对管理层的问题给出了结论性建议，而不是列举大量数据"
      no_hallucination: "Agent 没有在没有查询数据的情况下编造具体数字"
      conversation_quality: "Agent 正确处理了话题切换，切换后没有继续谈上一个话题；对简短要求作出了调整"


  - id: S04
    title: 数据分析师深度追问（SQL 透明度）
    personas: [chen_analyst]
    max_turns: 5
    tags: [analyst, sql-transparency, adversarial]

    business_context: |
      你是数据分析师，正在验证 Agent 的数据准确性。
      你要检验它的查询逻辑是否严谨，时间字段的选择是否正确，有没有遗漏重要的过滤条件。
      你不接受模糊答案，会一直追问直到得到技术细节。

    conversation_guidelines:
      - 从一个具体需求开始：查最近7天的订单，按状态分组统计数量
      - 收到答案后追问：你用的是哪个时间字段？
      - 再追问：有没有过滤掉取消的订单？
      - 换一个需求：同样的查询但看上个月的数据，和这7天对比
      - 追问：这两个数字哪个更能代表真实情况？为什么？

    ground_truth:
      expects_data_query: true
      expects_time_field_explanation: true  # agent 必须说明用了哪个时间字段
      expects_numbers: true

    session_criteria:
      goal_achieved: "分析师得到了订单数量数据，以及对时间字段选择的明确回答"
      data_accuracy: "Agent 提供的数字来自实际查询，时间字段选择合理且有说明"
      actionable: "Agent 清楚说明了使用的时间字段和过滤条件，逻辑自洽"
      no_hallucination: "Agent 没有在没有实际查询的情况下给出数字；没有声称查询了不存在的字段"
      conversation_quality: "Agent 对技术追问给出了技术性回应，没有回避 SQL 细节；对比查询逻辑一致"


  - id: S05
    title: 规则配置全流程（含确认机制）
    personas: [li_jie]
    max_turns: 5
    tags: [rule-config, write-interception, confirmation]

    business_context: |
      你想配置一个新的监控规则，比如检测低评分订单突增，或检测交付延迟。
      你不确定阈值应该设多少，希望 agent 先看看数据再给建议。
      过程中你会改变主意，调整一些参数。

    conversation_guidelines:
      - 开始：说想配一个监控告警规则，但不知道阈值怎么设
      - 当 agent 提出参数建议后，追问依据是什么
      - 接受建议后，要求创建规则
      - 在 agent 准备创建前或确认时，说等一下，执行时间改成每天早上8点
      - 确认创建后，追问规则已经生效了吗，怎么验证它在运行

    ground_truth:
      expects_data_query: true          # agent 必须查数据再建议阈值
      rule_should_be_created: true
      cron_expression: "0 8 * * *"      # 每天早8点

    session_criteria:
      goal_achieved: "对话结束时规则已被创建（或 pending 确认），包含用户指定的8点执行时间"
      data_accuracy: "Agent 在建议阈值前查询了数据，建议有数据依据"
      actionable: "Agent 在执行写操作前请求了用户确认，用户改变主意后使用了新参数"
      no_hallucination: "Agent 没有说规则已创建但实际没有执行写操作；创建时 cron 参数正确"
      conversation_quality: "Agent 正确处理了用户改变主意的情况；创建后给出了验证方法"
